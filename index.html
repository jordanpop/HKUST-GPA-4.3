<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Guides — HKUST GPA 4.3</title>
<style>
:root{
  --bg:#faf6ef; --paper:#fffdf7; --ink:#2b2a26; --muted:#6b6a63;
  --accent:#4a6b4a; --accent-soft:#d9e4d3;
  --wrong:#b85042; --wrong-soft:#f3dad6; --border:#d8d2c4;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Georgia,"Times New Roman",serif;line-height:1.6;}
.wrap{max-width:760px;margin:0 auto;padding:40px 24px 120px;}
h1{font-size:2.2em;margin:0 0 8px;letter-spacing:.5px}
.subtitle{color:var(--muted);font-style:italic;margin-bottom:30px}
.card{background:var(--paper);border:1px solid var(--border);border-radius:6px;padding:22px;margin:14px 0;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;transition:transform .2s, box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 8px rgba(0,0,0,.08)}
.subject-title{font-size:1.3em;font-weight:bold;margin-bottom:8px}
.subject-desc{color:var(--muted);font-size:.95em}
.reveal-on-scroll{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);will-change:opacity,transform}
.reveal-on-scroll.is-visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
</style>
</head>
<body>
<div class="wrap">
<h1>Study Guides</h1>
<div class="subtitle">HKUST GPA 4.3 — Select a subject</div>

<div class="card reveal-on-scroll reveal-delay-1" onclick="window.location.href='3040.html'">
  <div class="subject-title">LIFS3040</div>
  <div class="subject-desc">The Endocrine System — Lectures 1–5</div>
</div>

<div class="card reveal-on-scroll reveal-delay-2" onclick="window.location.href='2921.html'">
  <div class="subject-title">HUMA2921</div>
  <div class="subject-desc">Ethical Theories and Contemporary Issues — Lectures 3–5</div>
</div>

</div>

<script>
function initReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('is-visible');
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
}
window.addEventListener('DOMContentLoaded', initReveal);
</script>
</body>
</html>
